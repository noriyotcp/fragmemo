version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    ignore:
      # electron-vite 5.x requires vite ^5 || ^6 || ^7
      - dependency-name: "vite"
        versions: [">=8"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
