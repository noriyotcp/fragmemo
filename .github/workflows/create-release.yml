# Disabled until electron-builder is configured for v2
# See: Phase 4 in migration plan
name: Create Release

on:
  workflow_dispatch:

jobs:
  release-for-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: echo "TODO - configure electron-builder and add build/release steps"
