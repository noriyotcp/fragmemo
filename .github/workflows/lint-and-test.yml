name: Lint and Test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint-and-test:
    runs-on: macos-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
